{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1 style="font-weight: 800;">Bulk Threshold Update</h1>
</div>
<div class="card">
    <form method="POST">
        {% csrf_token %}
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Current Quantity</th>
                    <th>Low Stock Threshold</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product.name }}</td>
                    <td>{{ product.quantity }}</td>
                    <td>
                        <input type="number" name="threshold_{{ product.id }}" value="{{ product.threshold }}" 
                               style="width: 100px; padding: 5px; border-radius: 4px; border: 1px solid var(--border);">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div style="margin-top: 25px;">
            <button type="submit" class="btn btn-primary">Save All Changes</button>
            <a href="{% url 'product_list' %}" class="btn" style="background: #eee;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
